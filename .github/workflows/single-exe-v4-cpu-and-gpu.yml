name: Build LiteRT-LM Windows CPU Single EXE and GPU ZIP V4

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build V4 CPU single EXE and GPU portable ZIP
    runs-on: windows-latest

    defaults:
      run:
        shell: pwsh

    env:
      UPSTREAM_TAG: v0.10.2
      DXC_NUGET_VERSION: "1.8.2505.32"
      GH_TOKEN: ${{ github.token }}
      ANDROID_NDK_HOME: ""
      ANDROID_NDK_ROOT: ""

    steps:
      - name: WORKFLOW VERSION CHECK
        run: |
          Write-Host "WORKFLOW_VERSION=single-exe-v4-cpu-and-gpu"
          Write-Host "This workflow creates two ZIPs: CPU true single EXE, and GPU portable folder ZIP."

      - name: Checkout release repo
        uses: actions/checkout@v4

      - name: Prepare short Windows paths
        run: |
          New-Item -ItemType Directory -Force D:\s | Out-Null
          New-Item -ItemType Directory -Force D:\b | Out-Null
          New-Item -ItemType Directory -Force D:\t | Out-Null
          "SRC_DIR=D:\s" >> $env:GITHUB_ENV
          "BAZEL_OUTPUT_BASE=D:\b" >> $env:GITHUB_ENV
          "TEMP=D:\t" >> $env:GITHUB_ENV
          "TMP=D:\t" >> $env:GITHUB_ENV
          $env:TEMP = "D:\t"
          $env:TMP = "D:\t"
          Write-Host "SRC_DIR=D:\s"
          Write-Host "BAZEL_OUTPUT_BASE=D:\b"
          Write-Host "TEMP=$env:TEMP"
          Write-Host "TMP=$env:TMP"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Bazelisk
        run: |
          if (-not (Get-Command bazelisk -ErrorAction SilentlyContinue)) {
            winget install --id=Bazel.Bazelisk -e --accept-source-agreements --accept-package-agreements --disable-interactivity
          }
          $env:Path = "$([Environment]::GetEnvironmentVariable('Path','Machine'));$([Environment]::GetEnvironmentVariable('Path','User'));$env:Path"
          bazelisk --version

      - name: Enable long paths
        run: |
          git config --global core.longpaths true
          try {
            New-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem" -Name "LongPathsEnabled" -Value 1 -PropertyType DWORD -Force | Out-Null
          } catch {
            Write-Warning "Could not enable HKLM long paths. Continuing."
          }

      - name: Clone LiteRT-LM into short path
        run: |
          $env:TEMP = "D:\t"
          $env:TMP = "D:\t"
          if (Test-Path "D:\s\LiteRT-LM") {
            Remove-Item "D:\s\LiteRT-LM" -Recurse -Force
          }
          git clone --depth 1 --branch "$env:UPSTREAM_TAG" https://github.com/google-ai-edge/LiteRT-LM.git "D:\s\LiteRT-LM"
          git -C "D:\s\LiteRT-LM" lfs install
          git -C "D:\s\LiteRT-LM" lfs pull
          $commit = git -C "D:\s\LiteRT-LM" rev-parse HEAD
          "UPSTREAM_COMMIT=$commit" >> $env:GITHUB_ENV
          Write-Host "UPSTREAM_COMMIT=$commit"

      - name: Patch Android NDK registration out of WORKSPACE
        working-directory: D:\s\LiteRT-LM
        run: |
          $env:TEMP = "D:\t"
          $env:TMP = "D:\t"
          Remove-Item Env:ANDROID_NDK_HOME -ErrorAction SilentlyContinue
          Remove-Item Env:ANDROID_NDK_ROOT -ErrorAction SilentlyContinue
          $workspace = "WORKSPACE"
          $content = Get-Content $workspace -Raw
          $old = 'register_toolchains("@androidndk//:all" if ANDROID_NDK_HOME_IS_SET else "@android_ndk_env//:all")'
          $new = 'register_toolchains("@android_ndk_env//:all")'
          if ($content.Contains($old)) {
            $content = $content.Replace($old, $new)
            Set-Content $workspace $content -Encoding UTF8
            Write-Host "Patched Android NDK toolchain registration."
          } else {
            $pattern = 'register_toolchains\("@androidndk//:all"\s+if\s+ANDROID_NDK_HOME_IS_SET\s+else\s+"@android_ndk_env//:all"\)'
            $patched = [regex]::Replace($content, $pattern, $new)
            if ($patched -eq $content) {
              Select-String -Path $workspace -Pattern "androidndk|android_ndk_env|ANDROID_NDK_HOME|register_toolchains" -Context 2,2
              throw "Could not patch Android NDK toolchain registration."
            }
            Set-Content $workspace $patched -Encoding UTF8
            Write-Host "Patched Android NDK toolchain registration with regex fallback."
          }

      - name: Build CPU true single EXE
        working-directory: D:\s\LiteRT-LM
        run: |
          $env:TEMP = "D:\t"
          $env:TMP = "D:\t"
          Write-Host "WORKFLOW_VERSION=single-exe-v4-cpu-and-gpu"
          Write-Host "Building CPU true single EXE."
          bazelisk --output_base="D:\b" shutdown
          bazelisk --output_base="D:\b" `
            build `
            --config=windows `
            --build_tag_filters='-nowindows' `
            --define=LITERT_LM_FST_CONSTRAINTS_DISABLED=1 `
            --action_env=TEMP=D:\t `
            --action_env=TMP=D:\t `
            --jobs=4 `
            //runtime/engine:litert_lm_main

      - name: Package CPU true single EXE
        run: |
          $dist = "$env:GITHUB_WORKSPACE\dist-cpu"
          if (Test-Path $dist) { Remove-Item $dist -Recurse -Force }
          New-Item -ItemType Directory -Force $dist | Out-Null

          $exeSource = "D:\s\LiteRT-LM\bazel-bin\runtime\engine\litert_lm_main.exe"
          if (-not (Test-Path $exeSource)) { throw "Expected executable not found: $exeSource" }
          Copy-Item $exeSource "$dist\litert-lm-single-windows-x64.exe" -Force
          Copy-Item "D:\s\LiteRT-LM\LICENSE" "$dist\LICENSE-LiteRT-LM.txt" -Force
          if (Test-Path "D:\s\LiteRT-LM\NOTICE") { Copy-Item "D:\s\LiteRT-LM\NOTICE" "$dist\NOTICE-LiteRT-LM.txt" -Force }

          $readme = @(
            "LiteRT-LM Windows CPU Single EXE",
            "",
            "Workflow version: single-exe-v4-cpu-and-gpu",
            "Upstream repo: https://github.com/google-ai-edge/LiteRT-LM",
            "Upstream tag: $env:UPSTREAM_TAG",
            "Upstream commit: $env:UPSTREAM_COMMIT",
            "",
            "Usage:",
            "  .\litert-lm-single-windows-x64.exe --backend=cpu --model_path=C:\path\to\model.litertlm --input_prompt=\"Hello\"",
            "",
            "Important:",
            "  - This is the true single-EXE CPU package.",
            "  - Built with --define=LITERT_LM_FST_CONSTRAINTS_DISABLED=1.",
            "  - This removes the GemmaModelConstraintProvider sidecar DLL dependency.",
            "  - FST constrained decoding / constrained tool-call decoding is disabled.",
            "  - Models are not included."
          )
          $readme | Set-Content "$dist\README.txt" -Encoding UTF8

          $source = @(
            "Source:",
            "- Repository: https://github.com/google-ai-edge/LiteRT-LM",
            "- Tag: $env:UPSTREAM_TAG",
            "- Commit: $env:UPSTREAM_COMMIT",
            "",
            "Build:",
            "- Workflow version: single-exe-v4-cpu-and-gpu",
            "- Artifact kind: CPU true single EXE",
            "- Target: //runtime/engine:litert_lm_main",
            "- Bazel config: --config=windows",
            "- Bazel filter: --build_tag_filters='-nowindows'",
            "- Single-EXE flag: --define=LITERT_LM_FST_CONSTRAINTS_DISABLED=1",
            "- Short source path: D:\s\LiteRT-LM",
            "- Short Bazel output base: D:\b",
            "- Short temp path: D:\t",
            "- Bazel action_env TEMP/TMP forced to D:\t",
            "- Jobs limited to 4."
          )
          $source | Set-Content "$dist\SOURCE.txt" -Encoding UTF8

      - name: Verify CPU has no LiteRT-LM sidecar DLL dependency
        run: |
          $exe = "$env:GITHUB_WORKSPACE\dist-cpu\litert-lm-single-windows-x64.exe"
          $depsFile = "$env:GITHUB_WORKSPACE\dist-cpu\DEPENDENCIES.txt"
          $dumpbin = Get-ChildItem "${env:ProgramFiles}\Microsoft Visual Studio\2022" -Recurse -Filter dumpbin.exe -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -match "Hostx64\\x64" } |
            Select-Object -First 1 -ExpandProperty FullName
          if (-not $dumpbin) {
            "dumpbin.exe not found; dependency inspection skipped." | Set-Content $depsFile -Encoding UTF8
            Write-Warning "dumpbin.exe not found. Cannot prove sidecar dependency status."
            exit 0
          }
          & $dumpbin /DEPENDENTS $exe | Tee-Object -FilePath $depsFile
          $content = Get-Content $depsFile -Raw
          $forbidden = @(
            "libGemmaModelConstraintProvider.dll",
            "libLiteRt.dll",
            "libLiteRtWebGpuAccelerator.dll",
            "libLiteRtGpuAccelerator.dll",
            "libLiteRtTopKWebGpuSampler.dll",
            "dxcompiler.dll",
            "dxil.dll"
          )
          $found = @()
          foreach ($name in $forbidden) {
            if ($content -match [regex]::Escape($name)) { $found += $name }
          }
          if ($found.Count -gt 0) { throw "CPU package is not a single LiteRT-LM EXE. Found sidecar DLL dependency: $($found -join ', ')" }
          Write-Host "CPU package has no known LiteRT-LM sidecar DLL dependencies."

      - name: Build GPU portable ZIP executable
        working-directory: D:\s\LiteRT-LM
        run: |
          $env:TEMP = "D:\t"
          $env:TMP = "D:\t"
          Write-Host "Building GPU portable executable. This intentionally uses dynamic LiteRT/GPU libraries."
          bazelisk --output_base="D:\b" shutdown
          bazelisk --output_base="D:\b" `
            build `
            --config=windows `
            --build_tag_filters='-nowindows' `
            --define=LITERT_LM_FST_CONSTRAINTS_DISABLED=1 `
            --define=litert_link_capi_so=true `
            --define=resolve_symbols_in_exec=false `
            --action_env=TEMP=D:\t `
            --action_env=TMP=D:\t `
            --jobs=4 `
            //runtime/engine:litert_lm_main

      - name: Download DirectX Shader Compiler DLLs
        run: |
          $dxcRoot = "$env:GITHUB_WORKSPACE\dxc"
          $nupkg = "$env:GITHUB_WORKSPACE\Microsoft.Direct3D.DXC.$env:DXC_NUGET_VERSION.nupkg"
          if (Test-Path $dxcRoot) { Remove-Item $dxcRoot -Recurse -Force }
          New-Item -ItemType Directory -Force $dxcRoot | Out-Null
          Invoke-WebRequest -Uri "https://www.nuget.org/api/v2/package/Microsoft.Direct3D.DXC/$env:DXC_NUGET_VERSION" -OutFile $nupkg
          Expand-Archive -Path $nupkg -DestinationPath $dxcRoot -Force

          foreach ($name in @("dxcompiler.dll", "dxil.dll")) {
            $match = Get-ChildItem $dxcRoot -Recurse -Filter $name -ErrorAction SilentlyContinue |
              Where-Object { $_.FullName -match "x64" -and $_.FullName -notmatch "arm64" } |
              Select-Object -First 1
            if (-not $match) { throw "Could not find x64 $name in Microsoft.Direct3D.DXC package." }
            Write-Host "$name=$($match.FullName)"
            "$($name.Replace('.', '_'))=$($match.FullName)" >> $env:GITHUB_ENV
          }

      - name: Package GPU portable ZIP folder
        run: |
          $dist = "$env:GITHUB_WORKSPACE\dist-gpu"
          if (Test-Path $dist) { Remove-Item $dist -Recurse -Force }
          New-Item -ItemType Directory -Force $dist | Out-Null

          $exeSource = "D:\s\LiteRT-LM\bazel-bin\runtime\engine\litert_lm_main.exe"
          if (-not (Test-Path $exeSource)) { throw "Expected executable not found: $exeSource" }
          Copy-Item $exeSource "$dist\litert-lm-gpu-windows-x64.exe" -Force
          Copy-Item "D:\s\LiteRT-LM\LICENSE" "$dist\LICENSE-LiteRT-LM.txt" -Force
          if (Test-Path "D:\s\LiteRT-LM\NOTICE") { Copy-Item "D:\s\LiteRT-LM\NOTICE" "$dist\NOTICE-LiteRT-LM.txt" -Force }

          # LiteRT-LM GPU requires runtime/GPU DLLs beside the executable.
          # Use broad discovery because upstream prebuilt paths can move between tags.
          $requiredLiteRtDlls = @(
            "libLiteRt.dll",
            "libLiteRtWebGpuAccelerator.dll"
          )
          $optionalLiteRtDlls = @(
            "libLiteRtTopKWebGpuSampler.dll",
            "libGemmaModelConstraintProvider.dll"
          )

          foreach ($name in $requiredLiteRtDlls) {
            $match = Get-ChildItem "D:\s\LiteRT-LM" -Recurse -Filter $name -ErrorAction SilentlyContinue |
              Where-Object { $_.FullName -match "prebuilt|bazel-bin|external|windows|x86_64|x64" } |
              Select-Object -First 1
            if (-not $match) { throw "Required GPU/runtime DLL not found after git lfs pull: $name" }
            Copy-Item $match.FullName "$dist\$name" -Force
            Write-Host "Copied required DLL: $($match.FullName)"
          }

          foreach ($name in $optionalLiteRtDlls) {
            $match = Get-ChildItem "D:\s\LiteRT-LM" -Recurse -Filter $name -ErrorAction SilentlyContinue |
              Where-Object { $_.FullName -match "prebuilt|bazel-bin|external|windows|x86_64|x64" } |
              Select-Object -First 1
            if ($match) {
              Copy-Item $match.FullName "$dist\$name" -Force
              Write-Host "Copied optional DLL: $($match.FullName)"
            } else {
              Write-Warning "Optional DLL not found: $name"
            }
          }

          Copy-Item $env:dxcompiler_dll "$dist\dxcompiler.dll" -Force
          Copy-Item $env:dxil_dll "$dist\dxil.dll" -Force

          Get-ChildItem $dist | Sort-Object Name | Select-Object Name,Length | Format-Table -AutoSize | Out-String | Set-Content "$dist\FILES.txt" -Encoding UTF8

          $readme = @(
            "LiteRT-LM Windows GPU Portable ZIP",
            "",
            "Workflow version: single-exe-v4-cpu-and-gpu",
            "Upstream repo: https://github.com/google-ai-edge/LiteRT-LM",
            "Upstream tag: $env:UPSTREAM_TAG",
            "Upstream commit: $env:UPSTREAM_COMMIT",
            "",
            "Usage:",
            "  .\litert-lm-gpu-windows-x64.exe --backend=gpu --model_path=C:\path\to\model.litertlm --input_prompt=\"Hello\"",
            "",
            "Fallback test:",
            "  .\litert-lm-gpu-windows-x64.exe --backend=cpu --model_path=C:\path\to\model.litertlm --input_prompt=\"Hello\"",
            "",
            "Important:",
            "  - This is NOT a true single EXE.",
            "  - It is a portable GPU folder packaged as one ZIP.",
            "  - Keep the EXE and DLL files in the same folder.",
            "  - Windows GPU uses WebGPU / Direct3D and requires dxcompiler.dll and dxil.dll.",
            "  - Built with --define=LITERT_LM_FST_CONSTRAINTS_DISABLED=1.",
            "  - FST constrained decoding / constrained tool-call decoding is disabled.",
            "  - Models are not included."
          )
          $readme | Set-Content "$dist\README.txt" -Encoding UTF8

          $source = @(
            "Source:",
            "- Repository: https://github.com/google-ai-edge/LiteRT-LM",
            "- Tag: $env:UPSTREAM_TAG",
            "- Commit: $env:UPSTREAM_COMMIT",
            "",
            "Build:",
            "- Workflow version: single-exe-v4-cpu-and-gpu",
            "- Artifact kind: GPU portable ZIP folder",
            "- Target: //runtime/engine:litert_lm_main",
            "- Bazel config: --config=windows",
            "- Bazel filter: --build_tag_filters='-nowindows'",
            "- FST disabled flag: --define=LITERT_LM_FST_CONSTRAINTS_DISABLED=1",
            "- GPU dynamic LiteRT flags: --define=litert_link_capi_so=true --define=resolve_symbols_in_exec=false",
            "- DirectX Shader Compiler NuGet: Microsoft.Direct3D.DXC $env:DXC_NUGET_VERSION",
            "- Short source path: D:\s\LiteRT-LM",
            "- Short Bazel output base: D:\b",
            "- Short temp path: D:\t",
            "- Bazel action_env TEMP/TMP forced to D:\t",
            "- Jobs limited to 4."
          )
          $source | Set-Content "$dist\SOURCE.txt" -Encoding UTF8

      - name: Record GPU executable dependencies
        run: |
          $exe = "$env:GITHUB_WORKSPACE\dist-gpu\litert-lm-gpu-windows-x64.exe"
          $depsFile = "$env:GITHUB_WORKSPACE\dist-gpu\DEPENDENCIES.txt"
          $dumpbin = Get-ChildItem "${env:ProgramFiles}\Microsoft Visual Studio\2022" -Recurse -Filter dumpbin.exe -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -match "Hostx64\\x64" } |
            Select-Object -First 1 -ExpandProperty FullName
          if (-not $dumpbin) {
            "dumpbin.exe not found; dependency inspection skipped." | Set-Content $depsFile -Encoding UTF8
            Write-Warning "dumpbin.exe not found. Cannot inspect GPU executable dependencies."
            exit 0
          }
          & $dumpbin /DEPENDENTS $exe | Tee-Object -FilePath $depsFile

      - name: Create CPU ZIP
        id: zip_cpu
        run: |
          $zip = "$env:GITHUB_WORKSPACE\litert-lm-single-windows-x64-cpu-$env:UPSTREAM_TAG.zip"
          if (Test-Path $zip) { Remove-Item $zip -Force }
          Compress-Archive -Path "$env:GITHUB_WORKSPACE\dist-cpu\*" -DestinationPath $zip -Force
          "zip=$zip" >> $env:GITHUB_OUTPUT

      - name: Create GPU ZIP
        id: zip_gpu
        run: |
          $zip = "$env:GITHUB_WORKSPACE\litert-lm-portable-windows-x64-gpu-$env:UPSTREAM_TAG.zip"
          if (Test-Path $zip) { Remove-Item $zip -Force }
          Compress-Archive -Path "$env:GITHUB_WORKSPACE\dist-gpu\*" -DestinationPath $zip -Force
          "zip=$zip" >> $env:GITHUB_OUTPUT

      - name: Upload CPU workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: litert-lm-single-windows-x64-cpu-v4
          path: ${{ steps.zip_cpu.outputs.zip }}

      - name: Upload GPU workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: litert-lm-portable-windows-x64-gpu-v4
          path: ${{ steps.zip_gpu.outputs.zip }}

      - name: Publish GitHub release
        run: |
          $releaseTag = "litert-lm-windows-x64-v4-$env:UPSTREAM_TAG"
          $notes = @(
            "Unofficial LiteRT-LM native Windows x64 V4 build.",
            "",
            "This release publishes two ZIPs:",
            "- CPU: true single EXE package.",
            "- GPU: portable folder ZIP with EXE plus required LiteRT/WebGPU/DirectX DLLs.",
            "",
            "Workflow version: single-exe-v4-cpu-and-gpu",
            "CPU package is built with --define=LITERT_LM_FST_CONSTRAINTS_DISABLED=1 to remove the GemmaModelConstraintProvider DLL dependency.",
            "GPU package is intentionally not true single EXE; LiteRT GPU requires runtime/GPU shared libraries beside the executable.",
            "Both packages disable FST constrained decoding / constrained tool-call decoding.",
            "",
            "Build paths were shortened to avoid Windows/Rust/MSVC long-path link failures.",
            "",
            "Upstream:",
            "- Repo: google-ai-edge/LiteRT-LM",
            "- Tag: $env:UPSTREAM_TAG",
            "- Commit: $env:UPSTREAM_COMMIT"
          )
          $notesPath = "$env:GITHUB_WORKSPACE\release-notes.md"
          $notes | Set-Content $notesPath -Encoding UTF8
          $cpuZip = "${{ steps.zip_cpu.outputs.zip }}"
          $gpuZip = "${{ steps.zip_gpu.outputs.zip }}"
          gh release view $releaseTag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $releaseTag $cpuZip $gpuZip --clobber
          } else {
            gh release create $releaseTag $cpuZip $gpuZip --title "LiteRT-LM Windows x64 V4 $env:UPSTREAM_TAG" --notes-file $notesPath
          }
