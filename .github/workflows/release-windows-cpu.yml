name: Build LiteRT-LM Windows Runtime

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Windows x64 runtime
    runs-on: windows-latest

    defaults:
      run:
        shell: pwsh

    env:
      UPSTREAM_TAG: v0.10.2
      GH_TOKEN: ${{ github.token }}
      ANDROID_NDK_HOME: ""
      ANDROID_NDK_ROOT: ""

    steps:
      - name: Checkout release repo
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Bazelisk
        run: |
          if (-not (Get-Command bazelisk -ErrorAction SilentlyContinue)) {
            winget install --id=Bazel.Bazelisk -e --accept-source-agreements --accept-package-agreements --disable-interactivity
          }
          $env:Path = "$([Environment]::GetEnvironmentVariable('Path','Machine'));$([Environment]::GetEnvironmentVariable('Path','User'));$env:Path"
          bazelisk --version

      - name: Enable long paths
        run: |
          git config --global core.longpaths true
          try {
            New-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem" -Name "LongPathsEnabled" -Value 1 -PropertyType DWORD -Force | Out-Null
          } catch {
            Write-Warning "Could not enable HKLM long paths. Continuing."
          }

      - name: Clone LiteRT-LM
        run: |
          git clone --depth 1 --branch "$env:UPSTREAM_TAG" https://github.com/google-ai-edge/LiteRT-LM.git upstream
          git -C upstream lfs install
          git -C upstream lfs pull
          $commit = git -C upstream rev-parse HEAD
          "UPSTREAM_COMMIT=$commit" >> $env:GITHUB_ENV

      - name: Patch Android NDK registration out of WORKSPACE
        working-directory: upstream
        run: |
          Remove-Item Env:ANDROID_NDK_HOME -ErrorAction SilentlyContinue
          Remove-Item Env:ANDROID_NDK_ROOT -ErrorAction SilentlyContinue

          $workspace = "WORKSPACE"
          $content = Get-Content $workspace -Raw

          $old = 'register_toolchains("@androidndk//:all" if ANDROID_NDK_HOME_IS_SET else "@android_ndk_env//:all")'
          $new = 'register_toolchains("@android_ndk_env//:all")'

          if ($content.Contains($old)) {
            $content = $content.Replace($old, $new)
            Set-Content $workspace $content -Encoding UTF8
          } else {
            $pattern = 'register_toolchains\("@androidndk//:all"\s+if\s+ANDROID_NDK_HOME_IS_SET\s+else\s+"@android_ndk_env//:all"\)'
            $patched = [regex]::Replace($content, $pattern, $new)
            if ($patched -eq $content) {
              Select-String -Path $workspace -Pattern "androidndk|android_ndk_env|ANDROID_NDK_HOME|register_toolchains" -Context 2,2
              throw "Could not patch Android NDK toolchain registration."
            }
            Set-Content $workspace $patched -Encoding UTF8
          }

      - name: Build Windows executable
        working-directory: upstream
        run: |
          $shortSha = "${{ github.sha }}".Substring(0, 8)
          $outputBase = "D:/bzl-$shortSha"
          bazelisk --output_base="$outputBase" shutdown
          bazelisk --output_base="$outputBase" build --build_tag_filters='-nowindows' //runtime/engine:litert_lm_main

      - name: Package runtime with required DLLs
        run: |
          $dist = "dist"
          New-Item -ItemType Directory -Force $dist | Out-Null

          Copy-Item "upstream\bazel-bin\runtime\engine\litert_lm_main.exe" "$dist\litert-lm-cpu-windows-x64.exe" -Force
          Copy-Item "upstream\LICENSE" "$dist\LICENSE-LiteRT-LM.txt" -Force

          if (Test-Path "upstream\NOTICE") {
            Copy-Item "upstream\NOTICE" "$dist\NOTICE-LiteRT-LM.txt" -Force
          }

          if (-not (Test-Path "upstream\prebuilt\windows_x86_64\libGemmaModelConstraintProvider.dll")) {
            throw "Missing libGemmaModelConstraintProvider.dll in upstream prebuilt/windows_x86_64"
          }

          Get-ChildItem "upstream\prebuilt\windows_x86_64" -Filter "*.dll" -File | ForEach-Object {
            Copy-Item $_.FullName "$dist\$($_.Name)" -Force
          }

          $readme = @(
            "LiteRT-LM Windows Runtime",
            "",
            "Upstream repo: https://github.com/google-ai-edge/LiteRT-LM",
            "Upstream tag: $env:UPSTREAM_TAG",
            "Upstream commit: $env:UPSTREAM_COMMIT",
            "",
            "Usage:",
            "  .\litert-lm-cpu-windows-x64.exe --backend=cpu --model_path=C:\path\to\model.litertlm",
            "",
            "Important:",
            "  - Keep all DLL files beside the EXE.",
            "  - Do not move only the EXE to another folder.",
            "  - libGemmaModelConstraintProvider.dll is required at process startup.",
            "  - This is a portable folder release, not a true single-EXE release yet."
          )
          $readme | Set-Content "$dist\README.txt" -Encoding UTF8

          $source = @(
            "Source:",
            "- Repository: https://github.com/google-ai-edge/LiteRT-LM",
            "- Tag: $env:UPSTREAM_TAG",
            "- Commit: $env:UPSTREAM_COMMIT",
            "",
            "Runtime DLLs copied from:",
            "- upstream/prebuilt/windows_x86_64/*.dll"
          )
          $source | Set-Content "$dist\SOURCE.txt" -Encoding UTF8

          Get-ChildItem $dist | Sort-Object Name | ForEach-Object { Write-Host $_.Name }

      - name: Inspect dependencies
        run: |
          $exe = "dist\litert-lm-cpu-windows-x64.exe"
          $depsFile = "dist\DEPENDENCIES.txt"

          $dumpbin = Get-ChildItem "${env:ProgramFiles}\Microsoft Visual Studio\2022" -Recurse -Filter dumpbin.exe -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -match "Hostx64\\x64" } |
            Select-Object -First 1 -ExpandProperty FullName

          if ($dumpbin) {
            & $dumpbin /DEPENDENTS $exe | Tee-Object -FilePath $depsFile
          } else {
            "dumpbin.exe not found; dependency inspection skipped." | Set-Content $depsFile -Encoding UTF8
          }

      - name: Create zip
        id: zip
        run: |
          $zip = "litert-lm-windows-x64-portable-$env:UPSTREAM_TAG.zip"
          if (Test-Path $zip) { Remove-Item $zip -Force }
          Compress-Archive -Path "dist\*" -DestinationPath $zip -Force
          "zip=$zip" >> $env:GITHUB_OUTPUT

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: litert-lm-windows-x64-portable
          path: ${{ steps.zip.outputs.zip }}

      - name: Publish GitHub release
        run: |
          $releaseTag = "litert-lm-windows-x64-portable-$env:UPSTREAM_TAG"
          $notes = @(
            "Unofficial LiteRT-LM native Windows x64 portable runtime.",
            "",
            "Keep all DLL files beside the EXE.",
            "This is not a true single-EXE package yet.",
            "",
            "Upstream: google-ai-edge/LiteRT-LM $env:UPSTREAM_TAG / $env:UPSTREAM_COMMIT"
          )
          $notesPath = "release-notes.md"
          $notes | Set-Content $notesPath -Encoding UTF8
          $zip = "${{ steps.zip.outputs.zip }}"
          gh release view $releaseTag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $releaseTag $zip --clobber
          } else {
            gh release create $releaseTag $zip --title "LiteRT-LM Windows x64 portable runtime $env:UPSTREAM_TAG" --notes-file $notesPath
          }
