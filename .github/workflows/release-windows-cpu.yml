name: Build LiteRT-LM Windows CPU

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Show workflow started
        shell: pwsh
        run: |
          Write-Host "Workflow is running."
          Write-Host "Repo: $env:GITHUB_REPOSITORY"
          Write-Host "Ref: $env:GITHUB_REF"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Bazelisk
        shell: pwsh
        run: |
          winget install --id=Bazel.Bazelisk -e --accept-source-agreements --accept-package-agreements --disable-interactivity

          $machinePath = [Environment]::GetEnvironmentVariable("Path", "Machine")
          $userPath = [Environment]::GetEnvironmentVariable("Path", "User")
          $env:Path = "$machinePath;$userPath;$env:Path"

          bazelisk --version

      - name: Clone LiteRT-LM
        shell: pwsh
        run: |
          git config --global core.longpaths true
          git clone --depth 1 --branch v0.10.2 https://github.com/google-ai-edge/LiteRT-LM.git upstream
          git -C upstream rev-parse HEAD

      - name: Patch Android NDK out
        shell: pwsh
        working-directory: upstream
        run: |
          $env:ANDROID_NDK_HOME = ""
          $env:ANDROID_NDK_ROOT = ""
          $env:ANDROID_HOME = ""
          $env:ANDROID_SDK_ROOT = ""
          $env:ANDROID_SDK_HOME = ""

          $workspace = "WORKSPACE"
          $text = Get-Content $workspace -Raw

          $text = $text.Replace(
            'register_toolchains("@androidndk//:all" if ANDROID_NDK_HOME_IS_SET else "@android_ndk_env//:all")',
            'register_toolchains("@android_ndk_env//:all")'
          )

          Set-Content $workspace $text -Encoding UTF8

          Select-String -Path $workspace -Pattern "androidndk|android_ndk_env|register_toolchains" -Context 1,1

      - name: Build LiteRT-LM Windows CPU EXE
        shell: pwsh
        working-directory: upstream
        run: |
          bazelisk --output_base=D:/bzl build --build_tag_filters="-nowindows" //runtime/engine:litert_lm_main

      - name: Package artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null

          Copy-Item upstream\bazel-bin\runtime\engine\litert_lm_main.exe dist\litert-lm-cpu-windows-x64.exe
          Copy-Item upstream\LICENSE dist\LICENSE-LiteRT-LM.txt

          @"
LiteRT-LM Windows CPU runtime
Built from google-ai-edge/LiteRT-LM v0.10.2

Run:
  .\litert-lm-cpu-windows-x64.exe --backend=cpu --model_path=C:\path\to\model.litertlm
"@ | Set-Content dist\README.txt -Encoding UTF8

          Compress-Archive -Path dist\* -DestinationPath litert-lm-cpu-windows-x64.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: litert-lm-cpu-windows-x64
          path: litert-lm-cpu-windows-x64.zip