name: Release LiteRT-LM Windows CPU Single EXE

on:
  workflow_dispatch:
    inputs:
      upstream_tag:
        description: "LiteRT-LM tag to build, for example v0.10.2. Use latest for latest GitHub release."
        required: true
        default: "v0.10.2"
      release_tag:
        description: "Output release tag in this repo. Leave empty for litert-lm-cpu-windows-x64-<upstream_tag>."
        required: false
        default: ""
      prerelease:
        description: "Mark the GitHub release as prerelease."
        type: boolean
        required: true
        default: false

permissions:
  contents: write

jobs:
  build:
    name: Build Windows x64 CPU runtime
    runs-on: windows-latest

    defaults:
      run:
        shell: pwsh

    env:
      GH_TOKEN: ${{ github.token }}
      UPSTREAM_REPO: google-ai-edge/LiteRT-LM

    steps:
      - name: Checkout this release repo
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Bazelisk
        run: |
          if (-not (Get-Command bazelisk -ErrorAction SilentlyContinue)) {
            winget install --id=Bazel.Bazelisk -e --accept-source-agreements --accept-package-agreements --disable-interactivity
          }

          $machinePath = [Environment]::GetEnvironmentVariable("Path", "Machine")
          $userPath = [Environment]::GetEnvironmentVariable("Path", "User")
          $env:Path = "$machinePath;$userPath;$env:Path"

          bazelisk --version

      - name: Enable long Windows paths
        run: |
          git config --global core.longpaths true

          try {
            New-ItemProperty `
              -Path "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem" `
              -Name "LongPathsEnabled" `
              -Value 1 `
              -PropertyType DWORD `
              -Force | Out-Null
          } catch {
            Write-Warning "Could not set HKLM LongPathsEnabled. Continuing with short Bazel output base."
          }

      - name: Resolve upstream tag
        id: upstream
        run: |
          $requested = "${{ inputs.upstream_tag }}".Trim()

          if ($requested -eq "latest") {
            $tag = gh release view --repo $env:UPSTREAM_REPO --json tagName --jq ".tagName"
          } else {
            $tag = $requested
          }

          if (-not $tag) {
            throw "Could not resolve upstream LiteRT-LM tag."
          }

          "tag=$tag" >> $env:GITHUB_OUTPUT
          "UPSTREAM_TAG=$tag" >> $env:GITHUB_ENV
          Write-Host "Using upstream tag: $tag"

      - name: Clone LiteRT-LM
        run: |
          git clone --depth 1 --branch "${{ steps.upstream.outputs.tag }}" https://github.com/google-ai-edge/LiteRT-LM.git upstream

          git -C upstream lfs install
          git -C upstream lfs pull

          $commit = git -C upstream rev-parse HEAD
          "UPSTREAM_COMMIT=$commit" >> $env:GITHUB_ENV
          Write-Host "LiteRT-LM commit: $commit"

      - name: Patch out Android NDK toolchain for Windows CPU release
        working-directory: upstream
        run: |
          # Release 1 is Windows CPU-only. LiteRT-LM v0.10.2's WORKSPACE conditionally
          # registers the Android NDK toolchain when ANDROID_NDK_HOME is visible.
          # GitHub hosted Windows runners expose C:\Android\android-sdk\ndk\<version>,
          # and rules_android_ndk can fail while creating symlinks from that path.
          # Force the dummy no-op Android registration for this CPU-only build.

          Remove-Item Env:ANDROID_NDK_HOME -ErrorAction SilentlyContinue
          Remove-Item Env:ANDROID_NDK_ROOT -ErrorAction SilentlyContinue
          Remove-Item Env:ANDROID_HOME -ErrorAction SilentlyContinue
          Remove-Item Env:ANDROID_SDK_ROOT -ErrorAction SilentlyContinue
          Remove-Item Env:ANDROID_SDK_HOME -ErrorAction SilentlyContinue

          $workspace = "WORKSPACE"
          $content = Get-Content $workspace -Raw

          $old = 'register_toolchains("@androidndk//:all" if ANDROID_NDK_HOME_IS_SET else "@android_ndk_env//:all")'
          $new = 'register_toolchains("@android_ndk_env//:all")'

          if (-not $content.Contains($old)) {
            Write-Host "Expected register_toolchains line was not found. Showing nearby lines:"
            Select-String -Path $workspace -Pattern "register_toolchains|androidndk|android_ndk_env" -Context 2,2
            throw "Could not patch Android NDK toolchain registration."
          }

          $content = $content.Replace($old, $new)
          Set-Content $workspace $content -Encoding UTF8

          Write-Host "Patched WORKSPACE to avoid @androidndk for Windows CPU-only build:"
          Select-String -Path $workspace -Pattern "register_toolchains|androidndk|android_ndk_env" -Context 1,1

      - name: Set Bazel output base
        run: |
          if ($env:GITHUB_WORKSPACE -match "^[Dd]:") {
            "BAZEL_OUTPUT_BASE=D:/w-${{ github.run_id }}" >> $env:GITHUB_ENV
          } else {
            "BAZEL_OUTPUT_BASE=C:/w-${{ github.run_id }}" >> $env:GITHUB_ENV
          }

      - name: Build CPU-only Windows executable
        working-directory: upstream
        run: |
          bazelisk --output_base="$env:BAZEL_OUTPUT_BASE" shutdown

          bazelisk --output_base="$env:BAZEL_OUTPUT_BASE" `
            build `
            --disk_cache=~/.cache/bazel-windows `
            --build_tag_filters='-nowindows' `
            //runtime/engine:litert_lm_main

      - name: Package runtime
        run: |
          $dist = "dist"
          New-Item -ItemType Directory -Force $dist | Out-Null

          $exeSource = "upstream\bazel-bin\runtime\engine\litert_lm_main.exe"
          if (-not (Test-Path $exeSource)) {
            throw "Expected executable not found: $exeSource"
          }

          Copy-Item $exeSource "$dist\litert-lm-cpu-windows-x64.exe"
          Copy-Item "upstream\LICENSE" "$dist\LICENSE-LiteRT-LM.txt"

          if (Test-Path "upstream\NOTICE") {
            Copy-Item "upstream\NOTICE" "$dist\NOTICE-LiteRT-LM.txt"
          }

          @"
LiteRT-LM Windows CPU Runtime

Upstream repo: https://github.com/google-ai-edge/LiteRT-LM
Upstream tag: $env:UPSTREAM_TAG
Upstream commit: $env:UPSTREAM_COMMIT

This is an unofficial CPU-only native Windows x64 runtime build.
GPU files are intentionally not included.

Usage:
  .\litert-lm-cpu-windows-x64.exe --backend=cpu --model_path=C:\path\to\model.litertlm

Notes:
  - Models are not included.
  - This package is intended to contain no LiteRT GPU DLLs, no DirectXShaderCompiler DLLs, and no libLiteRt.dll sidecar.
  - The executable may still depend on normal Windows system/runtime DLLs.
"@ | Set-Content "$dist\README.txt" -Encoding UTF8

          @"
Source:
- Repository: https://github.com/google-ai-edge/LiteRT-LM
- Tag: $env:UPSTREAM_TAG
- Commit: $env:UPSTREAM_COMMIT

Build:
- Target: //runtime/engine:litert_lm_main
- Bazel args: --build_tag_filters='-nowindows'
- Android NDK toolchain registration patched out for Windows CPU-only release.
"@ | Set-Content "$dist\SOURCE.txt" -Encoding UTF8

      - name: Verify no known GPU sidecar dependency
        run: |
          $exe = "dist\litert-lm-cpu-windows-x64.exe"
          $depsFile = "dist\DEPENDENCIES.txt"

          $dumpbin = Get-ChildItem "${env:ProgramFiles}\Microsoft Visual Studio\2022" `
            -Recurse `
            -Filter dumpbin.exe `
            -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -match "Hostx64\\x64" } |
            Select-Object -First 1 -ExpandProperty FullName

          if (-not $dumpbin) {
            Write-Warning "dumpbin.exe not found. Skipping dependency inspection."
            "dumpbin.exe not found; dependency inspection skipped." | Set-Content $depsFile -Encoding UTF8
            exit 0
          }

          & $dumpbin /DEPENDENTS $exe | Tee-Object -FilePath $depsFile

          $content = Get-Content $depsFile -Raw
          $bad = @(
            "libLiteRt.dll",
            "libLiteRtWebGpuAccelerator.dll",
            "libLiteRtGpuAccelerator.dll",
            "dxcompiler.dll",
            "dxil.dll"
          )

          $found = @()
          foreach ($name in $bad) {
            if ($content -match [regex]::Escape($name)) {
              $found += $name
            }
          }

          if ($found.Count -gt 0) {
            throw "Unexpected GPU or LiteRT sidecar dependency found: $($found -join ', ')"
          }

          Write-Host "No known GPU sidecar dependency found."

      - name: Create zip
        id: zip
        run: |
          $safeTag = "$env:UPSTREAM_TAG" -replace '[^A-Za-z0-9._-]', '_'
          $zip = "litert-lm-cpu-windows-x64-$safeTag.zip"

          if (Test-Path $zip) {
            Remove-Item $zip -Force
          }

          Compress-Archive -Path "dist\*" -DestinationPath $zip -Force

          "zip=$zip" >> $env:GITHUB_OUTPUT
          Write-Host "Created $zip"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: litert-lm-cpu-windows-x64-${{ steps.upstream.outputs.tag }}
          path: ${{ steps.zip.outputs.zip }}

      - name: Publish GitHub release
        run: |
          $given = "${{ inputs.release_tag }}".Trim()

          if ($given) {
            $releaseTag = $given
          } else {
            $safeTag = "$env:UPSTREAM_TAG" -replace '[^A-Za-z0-9._-]', '_'
            $releaseTag = "litert-lm-cpu-windows-x64-$safeTag"
          }

          $notes = @"
Unofficial LiteRT-LM native Windows x64 CPU runtime.

Upstream:
- Repo: google-ai-edge/LiteRT-LM
- Tag: $env:UPSTREAM_TAG
- Commit: $env:UPSTREAM_COMMIT

Package:
- litert-lm-cpu-windows-x64.exe
- LICENSE-LiteRT-LM.txt
- README.txt
- SOURCE.txt
- DEPENDENCIES.txt

This Release 1 package intentionally excludes GPU accelerator DLLs and DirectXShaderCompiler DLLs.
For hosted GitHub Windows builds, the workflow patches LiteRT-LM's WORKSPACE to avoid Android NDK toolchain registration because this package is Windows CPU-only.
"@

          $notesPath = "release-notes.md"
          $notes | Set-Content $notesPath -Encoding UTF8

          $zip = "${{ steps.zip.outputs.zip }}"

          gh release view $releaseTag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $releaseTag $zip --clobber
          } else {
            $args = @(
              "release", "create", $releaseTag, $zip,
              "--title", "LiteRT-LM Windows x64 CPU runtime $env:UPSTREAM_TAG",
              "--notes-file", $notesPath
            )

            if ("${{ inputs.prerelease }}" -eq "true") {
              $args += "--prerelease"
            }

            gh @args
          }
