name: Sanity Workflow Test

on:
  push:
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Say workflow is running
        shell: pwsh
        run: |
          Write-Host "GitHub Actions is working."
          Write-Host "Repository: $env:GITHUB_REPOSITORY"
          Write-Host "Branch/ref: $env:GITHUB_REF"
          Write-Host "Commit: $env:GITHUB_SHA"