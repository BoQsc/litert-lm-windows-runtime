name: Build LiteRT-LM Windows Single EXE V7 Agent

on:
  workflow_dispatch:
    inputs:
      upstream_tag:
        description: "LiteRT-LM tag to build, e.g. v0.10.2 or latest"
        required: true
        default: "v0.10.2"
      bazel_jobs:
        description: "Bazel jobs. Use 2 for safer Windows/Rust builds."
        required: true
        default: "2"
      publish_release:
        description: "Publish GitHub Release"
        type: boolean
        required: true
        default: true

permissions:
  contents: write

concurrency:
  group: litert-v7-no-dll-agent
  cancel-in-progress: false

jobs:
  build:
    name: Build V7 no-DLL agent
    runs-on: windows-latest
    timeout-minutes: 90

    defaults:
      run:
        shell: pwsh

    env:
      GH_TOKEN: ${{ github.token }}
      ANDROID_NDK_HOME: ""
      ANDROID_NDK_ROOT: ""

    steps:
      - name: Checkout release repo
        uses: actions/checkout@v4

      - name: Prepare short Windows paths
        run: |
          New-Item -ItemType Directory -Force D:\s | Out-Null
          New-Item -ItemType Directory -Force D:\b | Out-Null
          New-Item -ItemType Directory -Force D:\t | Out-Null
          "TEMP=D:\t" >> $env:GITHUB_ENV
          "TMP=D:\t" >> $env:GITHUB_ENV

      - name: Resolve variables
        run: |
          $tag = "${{ inputs.upstream_tag }}".Trim()
          if (-not $tag) { $tag = "v0.10.2" }
          if ($tag -eq "latest") {
            $tag = gh release view --repo google-ai-edge/LiteRT-LM --json tagName --jq ".tagName"
            if (-not $tag) { throw "Could not resolve latest LiteRT-LM release tag." }
          }

          $jobs = 2
          [void][int]::TryParse("${{ inputs.bazel_jobs }}", [ref]$jobs)
          if ($jobs -lt 1) { $jobs = 1 }
          if ($jobs -gt 8) { $jobs = 8 }

          $safe = $tag -replace '[^A-Za-z0-9._-]', '_'
          "UPSTREAM_TAG=$tag" >> $env:GITHUB_ENV
          "SAFE_UPSTREAM_TAG=$safe" >> $env:GITHUB_ENV
          "BAZEL_JOBS=$jobs" >> $env:GITHUB_ENV

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Bazelisk
        run: |
          if (-not (Get-Command bazelisk -ErrorAction SilentlyContinue)) {
            winget install --id=Bazel.Bazelisk -e --accept-source-agreements --accept-package-agreements --disable-interactivity
          }
          $env:Path = "$([Environment]::GetEnvironmentVariable('Path','Machine'));$([Environment]::GetEnvironmentVariable('Path','User'));$env:Path"
          bazelisk --version

      - name: Enable long paths
        run: |
          git config --global core.longpaths true
          try {
            New-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem" -Name "LongPathsEnabled" -Value 1 -PropertyType DWORD -Force | Out-Null
          } catch {
            Write-Warning "Could not enable HKLM long paths; short D:\ paths are still used."
          }

      - name: Clone LiteRT-LM
        run: |
          $env:TEMP = "D:\t"
          $env:TMP = "D:\t"
          if (Test-Path "D:\s\LiteRT-LM") { Remove-Item "D:\s\LiteRT-LM" -Recurse -Force }
          git clone --depth 1 --branch "$env:UPSTREAM_TAG" https://github.com/google-ai-edge/LiteRT-LM.git "D:\s\LiteRT-LM"
          git -C "D:\s\LiteRT-LM" lfs install
          git -C "D:\s\LiteRT-LM" lfs pull
          $commit = git -C "D:\s\LiteRT-LM" rev-parse HEAD
          "UPSTREAM_COMMIT=$commit" >> $env:GITHUB_ENV

      - name: Patch Android NDK registration out of WORKSPACE
        working-directory: D:\s\LiteRT-LM
        run: |
          Remove-Item Env:ANDROID_NDK_HOME -ErrorAction SilentlyContinue
          Remove-Item Env:ANDROID_NDK_ROOT -ErrorAction SilentlyContinue
          $workspace = "WORKSPACE"
          $content = Get-Content $workspace -Raw
          $old = 'register_toolchains("@androidndk//:all" if ANDROID_NDK_HOME_IS_SET else "@android_ndk_env//:all")'
          $new = 'register_toolchains("@android_ndk_env//:all")'
          if ($content.Contains($old)) {
            $content = $content.Replace($old, $new)
            Set-Content $workspace $content -Encoding UTF8
          } else {
            $pattern = 'register_toolchains\("@androidndk//:all"\s+if\s+ANDROID_NDK_HOME_IS_SET\s+else\s+"@android_ndk_env//:all"\)'
            $patched = [regex]::Replace($content, $pattern, $new)
            if ($patched -eq $content) { throw "Could not patch Android NDK toolchain registration." }
            Set-Content $workspace $patched -Encoding UTF8
          }

      - name: Build no-DLL CPU single EXE
        working-directory: D:\s\LiteRT-LM
        run: |
          $env:TEMP = "D:\t"
          $env:TMP = "D:\t"
          bazelisk --output_base="D:\b" shutdown
          bazelisk --output_base="D:\b" `
            build `
            --build_tag_filters='-nowindows' `
            --define=LITERT_LM_FST_CONSTRAINTS_DISABLED=1 `
            --action_env=TEMP=D:\t `
            --action_env=TMP=D:\t `
            --jobs="$env:BAZEL_JOBS" `
            //runtime/engine:litert_lm_main

      - name: Package
        run: |
          $dist = "$env:GITHUB_WORKSPACE\dist"
          if (Test-Path $dist) { Remove-Item $dist -Recurse -Force }
          New-Item -ItemType Directory -Force $dist | Out-Null

          Copy-Item "D:\s\LiteRT-LM\bazel-bin\runtime\engine\litert_lm_main.exe" "$dist\litert-lm-single-windows-x64.exe" -Force
          Copy-Item "D:\s\LiteRT-LM\LICENSE" "$dist\LICENSE-LiteRT-LM.txt" -Force
          if (Test-Path "D:\s\LiteRT-LM\NOTICE") { Copy-Item "D:\s\LiteRT-LM\NOTICE" "$dist\NOTICE-LiteRT-LM.txt" -Force }

          Copy-Item "$env:GITHUB_WORKSPACE\interface\*" $dist -Recurse -Force

          $version = @(
            "package=cpu-single-exe-v7-agent",
            "workflow=single-exe-v7-agent",
            "upstream_tag=$env:UPSTREAM_TAG",
            "upstream_commit=$env:UPSTREAM_COMMIT",
            "fst_constraints_disabled=1",
            "gpu_support=0",
            "models_included=0",
            "no_litert_sidecar_dlls=1"
          )
          $version | Set-Content "$dist\VERSION.txt" -Encoding UTF8

          $readme = @(
            "LiteRT-LM Windows CPU Single EXE V7 Agent",
            "",
            "No DLL version. CPU only.",
            "Built with --define=LITERT_LM_FST_CONSTRAINTS_DISABLED=1.",
            "This keeps the EXE free from libGemmaModelConstraintProvider.dll, but hard FST constrained decoding is disabled.",
            "",
            "See the .cmd files and Python interface files included in this folder."
          )
          $readme | Set-Content "$dist\README.txt" -Encoding UTF8

      - name: Verify no known LiteRT-LM sidecar DLL dependency
        run: |
          $exe = "$env:GITHUB_WORKSPACE\dist\litert-lm-single-windows-x64.exe"
          $depsFile = "$env:GITHUB_WORKSPACE\dist\DEPENDENCIES.txt"
          $dumpbin = Get-ChildItem "${env:ProgramFiles}\Microsoft Visual Studio\2022" -Recurse -Filter dumpbin.exe -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -match "Hostx64\\x64" } |
            Select-Object -First 1 -ExpandProperty FullName
          if ($dumpbin) {
            & $dumpbin /DEPENDENTS $exe | Tee-Object -FilePath $depsFile
            $content = Get-Content $depsFile -Raw
            $forbidden = @("libGemmaModelConstraintProvider.dll","libLiteRt.dll","libLiteRtWebGpuAccelerator.dll","libLiteRtGpuAccelerator.dll","libLiteRtTopKWebGpuSampler.dll","dxcompiler.dll","dxil.dll")
            $found = @()
            foreach ($name in $forbidden) {
              if ($content -match [regex]::Escape($name)) { $found += $name }
            }
            if ($found.Count -gt 0) { throw "Found sidecar DLL dependency: $($found -join ', ')" }
          } else {
            "dumpbin.exe not found; dependency inspection skipped." | Set-Content $depsFile -Encoding UTF8
          }

      - name: Checksums and ZIP
        id: zip
        run: |
          $dist = "$env:GITHUB_WORKSPACE\dist"
          Get-ChildItem $dist -File | ForEach-Object {
            $hash = Get-FileHash $_.FullName -Algorithm SHA256
            "$($hash.Hash)  $($_.Name)"
          } | Set-Content "$dist\SHA256SUMS.txt" -Encoding ASCII

          $zip = "$env:GITHUB_WORKSPACE\litert-lm-cpu-single-agent-windows-x64-v7-$env:SAFE_UPSTREAM_TAG.zip"
          if (Test-Path $zip) { Remove-Item $zip -Force }
          Compress-Archive -Path "$dist\*" -DestinationPath $zip -Force
          "zip=$zip" >> $env:GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: litert-lm-cpu-single-agent-windows-x64-v7
          path: ${{ steps.zip.outputs.zip }}

      - name: Publish release
        if: ${{ inputs.publish_release }}
        run: |
          $releaseTag = "litert-lm-cpu-single-agent-windows-x64-v7-$env:SAFE_UPSTREAM_TAG"
          $notes = @(
            "LiteRT-LM Windows CPU Single EXE V7 Agent",
            "No LiteRT sidecar DLLs. CPU only.",
            "FST constrained decoding disabled.",
            "Upstream: $env:UPSTREAM_TAG / $env:UPSTREAM_COMMIT"
          )
          $notesPath = "$env:GITHUB_WORKSPACE\release-notes.md"
          $notes | Set-Content $notesPath -Encoding UTF8
          $zip = "${{ steps.zip.outputs.zip }}"
          gh release view $releaseTag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $releaseTag $zip --clobber
          } else {
            gh release create $releaseTag $zip --title "LiteRT-LM CPU Single EXE V7 Agent $env:UPSTREAM_TAG" --notes-file $notesPath
          }
